[build]
  functions = "netlify/functions"

# Only set content-type for the HTML page, not all routes
[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

# Morning Cruise Briefing — 8AM Caribbean time (12:00 UTC)
[functions."morning-brief"]
  schedule = "0 12 * * *"
