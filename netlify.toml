[build]
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

# Morning Cruise Briefing — 8AM Caribbean (12:00 UTC)
[functions."morning-brief"]
  schedule = "0 12 * * *"

[functions."send-brief"]
  schedule = "0 12 * * *"
