<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10141c"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="60%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#b09050"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle gold border -->
  <rect x="20" y="20" width="1160" height="590" rx="24" fill="none" stroke="url(#gold)" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Decorative accent line -->
  <rect x="80" y="480" width="120" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>

  <!-- Brand wordmark -->
  <text x="600" y="260" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="96" font-weight="bold" font-style="italic"
        fill="url(#gold)">Appetyt</text>

  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" letter-spacing="0.5"
        fill="#9a8e72">Discover the best restaurants worldwide</text>

  <!-- Stats line -->
  <text x="600" y="400" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="600" letter-spacing="2"
        fill="#5a4e38">248 CITIES · CURATED GUIDES · SCORES &amp; REVIEWS</text>

  <!-- Small emoji row for visual warmth -->
  <text x="600" y="540" text-anchor="middle" dominant-baseline="central"
        font-size="28" opacity="0.5">🍽  🗺  ✈️  🏆  🔥</text>
</svg>
