<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10141c"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="60%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#b09050"/>
    </linearGradient>
  </defs>

  <!-- Dark background (iOS masks to squircle automatically) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Bold italic "A" lettermark — matches the Dim Hour brand wordmark -->
  <text x="512" y="540" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="680" font-weight="bold" font-style="italic"
        fill="url(#gold)">A</text>
</svg>
