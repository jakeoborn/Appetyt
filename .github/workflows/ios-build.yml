# =============================================================================
# Dim Hour iOS Build Workflow
# =============================================================================
#
# This workflow builds the Capacitor iOS app using GitHub Actions' macOS runners,
# so you do NOT need a local Mac to produce an .ipa.
#
# --- APPLE SIGNING SETUP (required for the ios-build job) ---
#
# You need 4 GitHub repository secrets. Go to:
#   Settings > Secrets and variables > Actions > New repository secret
#
# 1. APPLE_CERTIFICATE_BASE64
#    Your Apple Distribution (or iOS Distribution) certificate as a base64 string.
#    Export the .p12 from Keychain Access, then run:
#      base64 -i Certificates.p12 | pbcopy
#    Paste the result as the secret value.
#
# 2. APPLE_CERTIFICATE_PASSWORD
#    The password you set when exporting the .p12 certificate.
#
# 3. APPLE_PROVISIONING_PROFILE_BASE64
#    Your App Store (or Ad Hoc) provisioning profile as a base64 string.
#    Download the .mobileprovision from Apple Developer Portal, then run:
#      base64 -i profile.mobileprovision | pbcopy
#    Paste the result as the secret value.
#
# 4. APPLE_TEAM_ID
#    Your 10-character Apple Developer Team ID.
#    Find it at: https://developer.apple.com/account → Membership Details
#
# Without these secrets, the ios-build job will fail at the signing step.
# The web-build job does NOT require any secrets and runs on every push.
# =============================================================================

name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    # Allows you to trigger this workflow manually from the Actions tab

jobs:
  # ===========================================================================
  # Job 1: Web Build Validation
  # ===========================================================================
  # Runs on every push to any branch. Validates that the web build succeeds.
  # This is a fast, cheap check (ubuntu runner) that catches build errors early.
  web-build:
    name: Validate Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      # Runs the build script: copies index.html to dist/
      - name: Build web app
        run: npm run build

      # Verify the build output exists
      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html not found after build"
            exit 1
          fi
          echo "Web build verified successfully."

  # ===========================================================================
  # Job 2: iOS Build
  # ===========================================================================
  # Runs only on pushes to main (and manual dispatch).
  # Uses a macOS runner to build and archive the iOS app with xcodebuild.
  ios-build:
    name: Build iOS App
    runs-on: macos-latest
    needs: web-build  # Only build iOS if web build passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      # Build the web app (copies index.html into dist/)
      - name: Build web app
        run: npm run build

      # -----------------------------------------------------------------------
      # Capacitor: Add the iOS platform if it doesn't already exist.
      # If you commit the ios/ directory to your repo, this step is a no-op.
      # If you .gitignore ios/, this step creates it fresh each time.
      # -----------------------------------------------------------------------
      - name: Add Capacitor iOS platform
        run: |
          if [ ! -d ios ]; then
            echo "ios/ directory not found, adding iOS platform..."
            npx cap add ios
          else
            echo "ios/ directory already exists, skipping cap add."
          fi

      # Sync web assets and native plugins into the iOS project
      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      # -----------------------------------------------------------------------
      # Apple Code Signing Setup
      # -----------------------------------------------------------------------
      # This step installs the certificate and provisioning profile into a
      # temporary keychain so xcodebuild can sign the app.
      # See the top of this file for instructions on setting up the secrets.
      # -----------------------------------------------------------------------
      - name: Install Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create a temporary keychain for the build
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate into the keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add the temporary keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Install the provisioning profile
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "Certificate and provisioning profile installed successfully."

      # -----------------------------------------------------------------------
      # Build & Archive the iOS app
      # -----------------------------------------------------------------------
      # xcodebuild archive creates a .xcarchive containing the signed app.
      # We use the workspace generated by Capacitor (App.xcworkspace).
      # -----------------------------------------------------------------------
      - name: Archive iOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ARCHIVE_PATH=$RUNNER_TEMP/Dim Hour.xcarchive

          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates \
            | xcpretty || true

          echo "Archive created at $ARCHIVE_PATH"

      # -----------------------------------------------------------------------
      # Export the archive to an .ipa file
      # -----------------------------------------------------------------------
      # The ExportOptions.plist tells xcodebuild how to package the archive.
      # Adjust the "method" value depending on your distribution target:
      #   - "app-store"  -> App Store / TestFlight
      #   - "ad-hoc"     -> Direct device install (requires device UDIDs)
      #   - "development"-> Debug builds
      # -----------------------------------------------------------------------
      - name: Export .ipa from archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ARCHIVE_PATH=$RUNNER_TEMP/Dim Hour.xcarchive
          EXPORT_PATH=$RUNNER_TEMP/ipa-output

          # Create an ExportOptions.plist for the export
          cat > $RUNNER_TEMP/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <!-- Change "app-store" to "ad-hoc" or "development" as needed -->
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            | xcpretty || true

          echo "IPA exported to $EXPORT_PATH"

      # Upload the .ipa as a GitHub Actions artifact so you can download it
      # from the Actions run page. Artifacts are retained for 90 days by default.
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dim Hour-iOS
          path: ${{ runner.temp }}/ipa-output/*.ipa
          if-no-files-found: error
          retention-days: 30

      # -----------------------------------------------------------------------
      # Cleanup: remove the temporary keychain and sensitive files
      # -----------------------------------------------------------------------
      - name: Clean up signing artifacts
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f $RUNNER_TEMP/certificate.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision
          rm -f $RUNNER_TEMP/ExportOptions.plist
          echo "Signing artifacts cleaned up."
